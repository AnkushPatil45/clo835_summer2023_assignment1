apiVersion: v1
kind: Pod
metadata:
  name: app-pod
  namespace: web
  labels:
    app: employees
spec:
  containers:
  - name: app
    image: 850133624498.dkr.ecr.us-east-1.amazonaws.com/clo835-app:latest
    env:
    - name: DBHOST
      value: "mysql-service.mysql.svc.cluster.local"
    - name: DBPORT
      value: "3306"
    - name: DBUSER
      value: "root"
    - name: DBPWD
      value: "pw"
    - name: DATABASE
      value: "employees"
    - name: APP_COLOR
      value: "blue"
    ports:
    - containerPort: 8080
  imagePullSecrets:
  - name: ecr-secret